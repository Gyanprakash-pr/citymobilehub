services:
  - type: web
    name: OnlineBazar
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn OnlineBazar.wsgi:application
    envVars:
      - key: DATABASE_URL
        value: postgres://youruser:yourpassword@yourhost:yourport/yourdbname  # ✅ Replace this with actual DB URL
      - key: SECRET_KEY
        value: your-very-secret-django-key     # ✅ Use a secure random string
      - key: DEBUG
        value: "False"
